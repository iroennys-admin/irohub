name: Build irohub APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APKs (all ABIs)
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build release APKs (unsigned if no signing key)
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        continue-on-error: true

      - name: Sign APKs (if secrets available)
        id: sign_apks
        if: env.SIGNING_KEY != ''
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"
          SIGNING_KEY: ${{ secrets.SIGNING_KEY_BASE64 }}
        continue-on-error: true

      - name: List built APKs
        run: |
          echo "=== APKs generados ==="
          find app/build/outputs -name "*.apk" -exec ls -lh {} \;

      - name: Collect and rename APKs
        run: |
          mkdir -p artifacts
          # Recoger todos los APKs (debug o release, firmados o no)
          find app/build/outputs -name "*.apk" | while read f; do
            base=$(basename "$f")
            # Determinar ABI
            if echo "$base" | grep -q "armeabi-v7a"; then
              abi="arm32"
            elif echo "$base" | grep -q "arm64-v8a"; then
              abi="arm64"
            elif echo "$base" | grep -q "x86_64"; then
              abi="x86_64"
            elif echo "$base" | grep -q "x86"; then
              abi="x86"
            else
              abi="universal"
            fi
            # Determinar tipo
            if echo "$f" | grep -q "release"; then
              type="release"
            else
              type="debug"
            fi
            out="artifacts/irohub-v1.0.0-${abi}-${type}.apk"
            cp "$f" "$out"
            echo "✅ $out"
          done
          ls -lh artifacts/

      - name: Upload APKs artifact
        uses: actions/upload-artifact@v4
        with:
          name: irohub-apks
          path: artifacts/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
          tag_name: ${{ github.ref_name == 'main' && 'latest' || github.ref_name }}
          name: irohub ${{ github.ref_name == 'main' && 'Latest Build' || github.ref_name }}
          body: |
            # irohub v1.0.0

            APKs generados automáticamente por GitHub Actions.

            ## Variantes
            - **arm32** (armeabi-v7a): Android 32-bit ARM (dispositivos antiguos)
            - **arm64** (arm64-v8a): Android 64-bit ARM (mayoría de dispositivos modernos)
            - **x86**: Emuladores / tablets Intel 32-bit
            - **x86_64**: Emuladores / dispositivos Intel 64-bit

            ## Instalación
            1. Descargá el APK correspondiente a tu dispositivo (normalmente arm64)
            2. Habilitá "Orígenes desconocidos" en Ajustes > Seguridad
            3. Instalá el APK

            ---
            Desarrollado por **@nautaii**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
