name: Build irohub APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build release APKs (all ABIs)
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: List built APKs
        run: |
          echo "=== APKs generados ==="
          find app/build/outputs/apk/release -name "*.apk" -exec ls -lh {} \;

      - name: Sign APKs
        id: sign_apks
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Rename signed APKs
        run: |
          mkdir -p artifacts
          for f in ${{steps.sign_apks.outputs.signedReleaseFiles}}; do
            base=$(basename "$f")
            # Extraer ABI del nombre si existe
            if echo "$base" | grep -q "armeabi-v7a"; then
              out="irohub-v1.0.0-arm32.apk"
            elif echo "$base" | grep -q "arm64-v8a"; then
              out="irohub-v1.0.0-arm64.apk"
            elif echo "$base" | grep -q "x86_64"; then
              out="irohub-v1.0.0-x86_64.apk"
            elif echo "$base" | grep -q "x86"; then
              out="irohub-v1.0.0-x86.apk"
            else
              out="irohub-v1.0.0-$base"
            fi
            cp "$f" "artifacts/$out"
            echo "✅ $out"
          done
          ls -lh artifacts/

      - name: Upload APKs artifact
        uses: actions/upload-artifact@v4
        with:
          name: irohub-apks
          path: artifacts/*.apk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
